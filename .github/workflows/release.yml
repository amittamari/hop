name: release

on:
  push:
    tags:
      - "v*"

# Default to read-only; only the publish job (which creates the release) needs
# write. The build job runs dependency build scripts and should stay read-only.
permissions:
  contents: read

env:
  BIN: hop

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package archive
        id: package
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          dist="${BIN}-${version}-${{ matrix.target }}"
          mkdir -p "$dist"
          cp "target/${{ matrix.target }}/release/${BIN}" "$dist/"
          [ -f README.md ] && cp README.md "$dist/"
          tar -czf "${dist}.tar.gz" "$dist"
          shasum -a 256 "${dist}.tar.gz" > "${dist}.tar.gz.sha256"
          echo "archive=${dist}.tar.gz" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.target }}
          path: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.archive }}.sha256

  publish:
    name: publish release and update tap
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: dist/*
          generate_release_notes: true

      - name: Render Homebrew formula
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          repo="${GITHUB_REPOSITORY}"
          sha() { awk '{print $1}' "dist/${BIN}-${version}-$1.tar.gz.sha256"; }
          url() { echo "https://github.com/${repo}/releases/download/${GITHUB_REF_NAME}/${BIN}-${version}-$1.tar.gz"; }

          mkdir -p tap/Formula
          cat > tap/Formula/hop.rb <<EOF
          # This file is generated by .github/workflows/release.yml. Do not edit by hand.
          class Hop < Formula
            desc "Fast full-text search and resume for coding-agent sessions"
            homepage "https://github.com/${repo}"
            version "${version}"
            license "MIT"

            depends_on "gh" => :recommended

            on_macos do
              on_arm do
                url "$(url aarch64-apple-darwin)"
                sha256 "$(sha aarch64-apple-darwin)"
              end
            end

            on_linux do
              on_arm do
                url "$(url aarch64-unknown-linux-gnu)"
                sha256 "$(sha aarch64-unknown-linux-gnu)"
              end
              on_intel do
                url "$(url x86_64-unknown-linux-gnu)"
                sha256 "$(sha x86_64-unknown-linux-gnu)"
              end
            end

            def install
              bin.install "hop"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/hop --version")
            end
          end
          EOF
          cat tap/Formula/hop.rb

      - name: Push formula to Homebrew tap
        shell: bash
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          owner="${GITHUB_REPOSITORY%%/*}"

          # Pass the token via an auth header instead of embedding it in the
          # remote URL, so it is never persisted to .git/config or leaked in
          # git error output.
          auth_header="AUTHORIZATION: basic $(printf 'x-access-token:%s' "$TAP_TOKEN" | base64 | tr -d '\n')"

          git -c "http.extraheader=$auth_header" \
            clone "https://github.com/${owner}/homebrew-tap.git" tap-repo
          mkdir -p tap-repo/Formula
          cp tap/Formula/hop.rb tap-repo/Formula/hop.rb
          cd tap-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/hop.rb
          if git diff --cached --quiet; then
            echo "Formula already up to date."
          else
            git commit -m "hop ${version}"
            git -c "http.extraheader=$auth_header" push origin HEAD
          fi
