name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  BIN: hop

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package archive
        id: package
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          dist="${BIN}-${version}-${{ matrix.target }}"
          mkdir -p "$dist"
          cp "target/${{ matrix.target }}/release/${BIN}" "$dist/"
          [ -f README.md ] && cp README.md "$dist/"
          tar -czf "${dist}.tar.gz" "$dist"
          shasum -a 256 "${dist}.tar.gz" > "${dist}.tar.gz.sha256"
          echo "archive=${dist}.tar.gz" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.archive }}.sha256

  publish:
    name: publish release and update tap
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

      - name: Render Homebrew formula
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          repo="${GITHUB_REPOSITORY}"
          sha() { awk '{print $1}' "dist/${BIN}-${version}-$1.tar.gz.sha256"; }
          url() { echo "https://github.com/${repo}/releases/download/${GITHUB_REF_NAME}/${BIN}-${version}-$1.tar.gz"; }

          mkdir -p tap/Formula
          cat > tap/Formula/hop.rb <<EOF
          # This file is generated by .github/workflows/release.yml. Do not edit by hand.
          class Hop < Formula
            desc "Fast full-text search and resume for coding-agent sessions"
            homepage "https://github.com/${repo}"
            version "${version}"
            license "MIT"

            on_macos do
              on_arm do
                url "$(url aarch64-apple-darwin)"
                sha256 "$(sha aarch64-apple-darwin)"
              end
            end

            on_linux do
              on_arm do
                url "$(url aarch64-unknown-linux-gnu)"
                sha256 "$(sha aarch64-unknown-linux-gnu)"
              end
              on_intel do
                url "$(url x86_64-unknown-linux-gnu)"
                sha256 "$(sha x86_64-unknown-linux-gnu)"
              end
            end

            def install
              bin.install "hop"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/hop --version")
            end
          end
          EOF
          cat tap/Formula/hop.rb

      - name: Push formula to Homebrew tap
        shell: bash
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          owner="${GITHUB_REPOSITORY%%/*}"
          tap_repo="https://x-access-token:${TAP_TOKEN}@github.com/${owner}/homebrew-hop.git"

          git clone "$tap_repo" tap-repo
          mkdir -p tap-repo/Formula
          cp tap/Formula/hop.rb tap-repo/Formula/hop.rb
          cd tap-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "Formula already up to date."
          else
            git add Formula/hop.rb
            git commit -m "hop ${version}"
            git push
          fi
