name: release-plz

# Runs on every push to master. release-plz keeps a single, accumulating
# "Release PR" up to date as commits land (it amends one PR, not one-per-merge),
# and the `release` job tags only once that PR is merged and master's version
# moves ahead of the latest tag. workflow_dispatch is kept for manual runs.
on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  # Opens / updates the "Release PR" that bumps the version in Cargo.toml and
  # writes CHANGELOG.md from conventional commits since the last release.
  release-pr:
    name: open release PR
    runs-on: ubuntu-latest
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLZ_TOKEN }}

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Run release-plz (release-pr)
        uses: release-plz/action@e8792575c7f2366cf6ff3ccc33ead9ace5b691c7 # v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}

  # After the Release PR is merged, creates the git tag. Pushing the tag with a
  # PAT (not the default GITHUB_TOKEN) is what lets release.yml fire and build
  # the binaries + Homebrew formula.
  release:
    name: tag release
    runs-on: ubuntu-latest
    concurrency:
      group: release-plz-tag-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLZ_TOKEN }}

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Run release-plz (release)
        uses: release-plz/action@e8792575c7f2366cf6ff3ccc33ead9ace5b691c7 # v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
