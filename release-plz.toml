# release-plz configuration — https://release-plz.dev/docs/config
#
# hop ships as prebuilt binaries via a Homebrew tap, not as a crates.io crate.
# So we disable crates.io publishing and let release-plz only manage the
# version bump, CHANGELOG.md, and the git tag. The existing release.yml
# (triggered by the v* tag) builds binaries and updates the tap.

[workspace]
# Do not `cargo publish` to crates.io.
publish = false
# Disable cargo-semver-checks. It compares our public API against a baseline
# downloaded from crates.io for the crate name "hop" — but that name is taken by
# an unrelated crate (the Hop.io platform SDK), so it reports its entire API as
# "breaking changes". We ship a binary via Homebrew with no library consumers,
# so semver checking is meaningless here.
semver_check = false
# Only open a Release PR when there's a feat or fix since the last release.
# docs/chore/ci-only changes won't trigger a release on their own — they still
# get folded into the next feat/fix release's changelog.
release_commits = "^(feat|fix)"
# Create the git tag (this is what triggers release.yml).
git_tag_enable = true
# Let release.yml own the GitHub Release (binaries + auto-generated notes);
# release-plz just maintains CHANGELOG.md in-repo and tags.
git_release_enable = false
